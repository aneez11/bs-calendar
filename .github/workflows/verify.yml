name: Verify BS Calendar Data

on:
  schedule:
    # Run monthly to catch data drift
    - cron: '0 0 1 * *'
  workflow_dispatch:  # Allow manual trigger
  pull_request:
    paths:
      - 'src/data/bs-data.raw.json'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build:data
      - run: npx tsx scripts/verify-data.ts
      - run: npm test
